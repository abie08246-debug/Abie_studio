<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный аккаунт</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-card {
            background: var(--tg-theme-secondary-bg-color, #f1f1f1);
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .avatar {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .username {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #707579);
        }

        .title {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.4;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="profile-card" id="profile-card">
    <div class="avatar" id="avatar"></div>
    <div class="name" id="name">Пользователь</div>
    <div class="username" id="username">@telegram</div>
    <div class="title">Личный аккаунт</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const avatarEl = document.getElementById('avatar');
    const nameEl = document.getElementById('name');
    const usernameEl = document.getElementById('username');

    const user = tg.initDataUnsafe.user;

    if (user) {
        const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim();
        nameEl.textContent = fullName || 'Пользователь';

        if (user.username) {
            usernameEl.textContent = '@' + user.username;
        } else {
            usernameEl.textContent = 'Telegram';
        }

        if (user.photo_url) {
            avatarEl.innerHTML = `<img src="${user.photo_url}" alt="avatar">`;
        } else {
            avatarEl.textContent = (user.first_name || 'U')[0].toUpperCase();
        }
    }

    document.getElementById('profile-card').addEventListener('click', () => {
        if (user) {
            tg.showAlert(
                `👤 ${user.first_name || ''} ${user.last_name || ''}\n` +
                (user.username ? '@' + user.username : '')
            );
        }
    });
</script>

</body>
</html>
